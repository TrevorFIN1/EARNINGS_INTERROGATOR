<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Earnings Call Interrogator</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;700;800&family=Literata:ital,wght@0,400;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#08090a;--surface:#0f1012;--surface2:#161719;--surface3:#1e2022;
  --border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.11);--border3:rgba(255,255,255,0.18);
  --text:#eceae4;--text2:#9a9891;--text3:#5a5956;
  --accent:#d4f53c;--accent2:#a8c42e;
  --red:#ff4f4f;--red-bg:rgba(255,79,79,0.08);--red-border:rgba(255,79,79,0.2);
  --amber:#f59e0b;--amber-bg:rgba(245,158,11,0.08);--amber-border:rgba(245,158,11,0.2);
  --green:#22c55e;--green-bg:rgba(34,197,94,0.08);--green-border:rgba(34,197,94,0.2);
  --blue:#60a5fa;--blue-bg:rgba(96,165,250,0.08);--blue-border:rgba(96,165,250,0.2);
  --font-d:'Syne',sans-serif;--font-b:'Literata',Georgia,serif;--font-m:'DM Mono',monospace;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--font-b);font-size:16px;line-height:1.65;min-height:100vh;overflow-x:hidden}
body::after{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(255,255,255,0.015) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.015) 1px,transparent 1px);background-size:60px 60px;pointer-events:none;z-index:0}
.wrap{position:relative;z-index:1;max-width:920px;margin:0 auto;padding:0 32px 100px}
nav{display:flex;align-items:center;justify-content:space-between;padding:24px 0;margin-bottom:8px;border-bottom:1px solid var(--border)}
.nav-logo{display:flex;align-items:center;gap:12px}
.logo-mark{width:30px;height:30px;background:var(--accent);border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:var(--font-d);font-size:14px;font-weight:800;color:#08090a}
.logo-text{font-family:var(--font-d);font-size:15px;font-weight:700;color:var(--text)}
.nav-tag{font-family:var(--font-m);font-size:10px;letter-spacing:0.12em;color:var(--accent);background:rgba(212,245,60,0.08);border:1px solid rgba(212,245,60,0.15);padding:4px 10px;border-radius:4px}
.hero{padding:52px 0 40px;text-align:center}
.hero-eyebrow{font-family:var(--font-m);font-size:11px;letter-spacing:0.18em;color:var(--text3);margin-bottom:16px}
.hero h1{font-family:var(--font-d);font-size:clamp(38px,6vw,64px);font-weight:800;line-height:0.95;letter-spacing:-0.03em;margin-bottom:20px}
.hero h1 em{font-style:italic;color:var(--accent);font-weight:400}
.hero p{font-size:16px;color:var(--text2);max-width:500px;margin:0 auto}
.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:26px 30px;margin-bottom:16px}
.card-label{font-family:var(--font-m);font-size:10px;letter-spacing:0.14em;color:var(--text3);text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.card-label::before{content:'';display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--accent)}
textarea{width:100%;min-height:190px;background:var(--surface2);border:1px solid var(--border2);border-radius:10px;padding:16px 18px;font-family:var(--font-m);font-size:13px;color:var(--text);line-height:1.6;resize:vertical;outline:none;transition:border-color 0.2s;caret-color:var(--accent)}
textarea:focus{border-color:rgba(212,245,60,0.3)}
textarea::placeholder{color:var(--text3)}
.btn-row{display:flex;gap:10px;margin-top:14px;flex-wrap:wrap;align-items:center}
.btn-primary{background:var(--accent);color:#08090a;border:none;padding:12px 26px;border-radius:8px;font-family:var(--font-d);font-size:13px;font-weight:700;letter-spacing:0.04em;cursor:pointer;transition:all 0.15s;display:inline-flex;align-items:center;gap:8px;text-transform:uppercase}
.btn-primary:hover{background:var(--accent2)}
.btn-primary:disabled{opacity:0.35;cursor:not-allowed}
.btn-ghost{background:transparent;border:1px solid var(--border2);color:var(--text2);padding:12px 18px;border-radius:8px;font-family:var(--font-d);font-size:13px;font-weight:500;cursor:pointer;transition:all 0.15s;display:inline-flex;align-items:center;gap:8px}
.btn-ghost:hover{border-color:var(--border3);color:var(--text);background:var(--surface2)}
.btn-ghost:disabled{opacity:0.35;cursor:not-allowed}
.spin{width:14px;height:14px;border:2px solid rgba(10,11,12,0.25);border-top-color:#08090a;border-radius:50%;animation:rot 0.65s linear infinite;flex-shrink:0}
.spin-l{border-color:rgba(255,255,255,0.1);border-top-color:var(--text2)}
@keyframes rot{to{transform:rotate(360deg)}}
.gen-bar{height:2px;background:var(--border);border-radius:1px;overflow:hidden;margin-top:14px;display:none}
.gen-bar.on{display:block}
.gen-bar-fill{height:100%;background:var(--accent);animation:gen 1.8s ease-in-out infinite}
@keyframes gen{0%{width:0;margin-left:0}50%{width:60%;margin-left:20%}100%{width:0;margin-left:100%}}
.gen-txt{font-family:var(--font-m);font-size:11px;color:var(--text3);margin-top:8px;display:none}
.gen-txt.on{display:block}
.err{background:var(--red-bg);border:1px solid var(--red-border);border-radius:8px;padding:12px 16px;font-size:13px;color:var(--red);margin-top:12px;display:none;font-family:var(--font-m)}
#results{display:none;margin-top:44px;animation:fadeUp 0.4s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.divider{height:1px;background:var(--border);margin:28px 0}
.res-header{display:flex;align-items:flex-start;justify-content:space-between;gap:20px;margin-bottom:28px;flex-wrap:wrap}
.res-company{font-family:var(--font-d);font-size:12px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--text3);margin-bottom:4px}
.res-title{font-family:var(--font-d);font-size:26px;font-weight:800;color:var(--text);letter-spacing:-0.02em}
.score-block{display:flex;flex-direction:column;align-items:center;gap:6px;flex-shrink:0}
.ring-wrap{position:relative;width:100px;height:100px}
.ring-wrap svg{position:absolute;inset:0;transform:rotate(-90deg)}
.ring-bg{fill:none;stroke:var(--surface3);stroke-width:6}
.ring-fill{fill:none;stroke-width:6;stroke-linecap:round;transition:stroke-dashoffset 1.2s cubic-bezier(.25,.8,.25,1)}
.ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring-num{font-family:var(--font-d);font-size:28px;font-weight:800;line-height:1}
.ring-denom{font-family:var(--font-m);font-size:10px;color:var(--text3)}
.grade-badge{font-family:var(--font-d);font-size:11px;font-weight:700;letter-spacing:0.1em;padding:4px 12px;border-radius:4px}
.score-reasoning{background:var(--surface2);border-left:3px solid var(--accent);border-radius:0 10px 10px 0;padding:16px 20px;margin-bottom:20px;font-size:14px;color:var(--text2);line-height:1.7;font-style:italic}
.deductions{margin-bottom:28px}
.deduction-title{font-family:var(--font-m);font-size:10px;letter-spacing:0.12em;color:var(--text3);text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.deduction-title::before{content:'';display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--red)}
.deduction-item{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:8px;display:grid;grid-template-columns:1fr auto;gap:10px;align-items:start}
.deduction-left .d-reason{font-size:13px;font-weight:500;color:var(--text);font-family:var(--font-d);margin-bottom:4px}
.deduction-left .d-quote{font-family:var(--font-b);font-style:italic;font-size:13px;color:var(--text2);margin-bottom:4px;padding:6px 10px;background:var(--surface2);border-radius:5px}
.deduction-left .d-weight{font-size:12px;color:var(--text3);line-height:1.5}
.deduction-pts{font-family:var(--font-d);font-size:20px;font-weight:800;color:var(--red);white-space:nowrap}
.deduction-pts span{font-size:12px;font-weight:400;color:var(--text3)}
.sent-row{display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.sent-pill{font-family:var(--font-m);font-size:11px;letter-spacing:0.08em;padding:5px 12px;border-radius:5px;font-weight:500}
.sent-note{font-size:13px;color:var(--text2)}
.counter-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:24px}
.counter-card{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center}
.counter-num{font-family:var(--font-d);font-size:30px;font-weight:800;line-height:1;margin-bottom:3px}
.counter-label{font-family:var(--font-m);font-size:9px;letter-spacing:0.1em;color:var(--text3);text-transform:uppercase}
.sub-scores{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:12px;margin-bottom:28px}
.sub-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px 20px}
.sub-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.sub-name{font-family:var(--font-d);font-size:13px;font-weight:700;color:var(--text)}
.sub-num{font-family:var(--font-d);font-size:22px;font-weight:800}
.sub-bar-wrap{height:4px;background:var(--surface3);border-radius:2px;margin-bottom:10px;overflow:hidden}
.sub-bar-fill{height:100%;border-radius:2px;transition:width 0.9s cubic-bezier(.25,.8,.25,1)}
.sub-explanation{font-size:12px;color:var(--text2);line-height:1.55;margin-bottom:10px}
.sub-highlights{display:flex;flex-direction:column;gap:6px}
.sub-highlight{font-family:var(--font-b);font-style:italic;font-size:12px;color:var(--text3);padding:6px 10px;background:var(--surface2);border-radius:5px;border-left:2px solid var(--border2);line-height:1.5}
.metrics-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:24px}
.metric-card{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:14px 16px}
.metric-label{font-family:var(--font-m);font-size:10px;letter-spacing:0.1em;color:var(--text3);text-transform:uppercase;margin-bottom:4px;display:flex;align-items:center;justify-content:space-between}
.metric-trend-up{color:var(--green);font-size:11px}
.metric-trend-down{color:var(--red);font-size:11px}
.metric-trend-flat{color:var(--text3);font-size:11px}
.metric-value{font-family:var(--font-d);font-size:20px;font-weight:700;color:var(--text);margin-bottom:3px;line-height:1}
.metric-note{font-size:12px;color:var(--text2);line-height:1.4}
.flags-list{display:flex;flex-direction:column;gap:8px;margin-bottom:24px}
.flag-item{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px 18px;position:relative;overflow:hidden}
.flag-item::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px}
.flag-item.sCritical::before{background:var(--red)}
.flag-item.sHigh::before{background:var(--amber)}
.flag-item.sMedium::before{background:var(--blue)}
.flag-item.sLow::before{background:var(--text3)}
.flag-item.sPositive::before{background:var(--green)}
.flag-header{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.sev-tag{font-family:var(--font-m);font-size:10px;letter-spacing:0.08em;padding:3px 8px;border-radius:3px;text-transform:uppercase;font-weight:500}
.tCritical{background:var(--red-bg);color:var(--red);border:1px solid var(--red-border)}
.tHigh{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-border)}
.tMedium{background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-border)}
.tLow{background:rgba(255,255,255,0.04);color:var(--text3);border:1px solid var(--border)}
.tPositive{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border)}
.flag-type{font-family:var(--font-d);font-size:13px;font-weight:700;color:var(--text)}
.flag-quote{font-family:var(--font-b);font-style:italic;font-size:13px;color:var(--text2);margin-bottom:8px;padding:8px 12px;background:var(--surface2);border-radius:6px}
.flag-analysis{font-size:13px;color:var(--text2);line-height:1.6}
.questions-list{display:flex;flex-direction:column;gap:8px;margin-bottom:24px}
.q-item{display:flex;gap:12px;align-items:flex-start;padding:12px 16px;background:var(--surface2);border:1px solid var(--border);border-radius:10px}
.q-num{font-family:var(--font-m);font-size:11px;color:var(--accent);font-weight:500;flex-shrink:0;margin-top:1px}
.q-text{font-size:14px;color:var(--text2);line-height:1.55}
.verdict-box{background:var(--surface);border:1px solid var(--border2);border-radius:14px;padding:28px;margin-bottom:28px;position:relative;overflow:hidden}
.verdict-box::after{content:'VERDICT';position:absolute;right:-8px;top:50%;transform:translateY(-50%) rotate(90deg);font-family:var(--font-d);font-size:72px;font-weight:800;color:rgba(255,255,255,0.018);pointer-events:none}
.verdict-text{font-size:15px;color:var(--text);line-height:1.8;position:relative;z-index:1}
.data-source{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:20px 24px;margin-top:28px}
.ds-header{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.ds-icon{width:28px;height:28px;background:rgba(96,165,250,0.1);border:1px solid var(--blue-border);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.ds-title{font-family:var(--font-d);font-size:13px;font-weight:700;color:var(--text)}
.ds-subtitle{font-family:var(--font-m);font-size:10px;color:var(--text3);letter-spacing:0.08em}
.ds-body{font-size:13px;color:var(--text2);line-height:1.7;margin-bottom:14px}
.ds-pills{display:flex;flex-wrap:wrap;gap:8px}
.ds-pill{font-family:var(--font-m);font-size:10px;padding:4px 10px;border-radius:4px;background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-border);letter-
